<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curato — Premium Affiliate Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
<script src="https://unpkg.com/lucide@latest"></script>
<script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #161616;
    --border: #222222;
    --gold: #c9a84c;
    --gold-light: #e2c07a;
    --white: #f5f5f0;
    --muted: #888888;
    --font-display: 'Cormorant Garamond', serif;
    --font-body: 'Inter', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    padding: 0 40px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,10,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    transition: background 0.3s;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 0.08em;
    color: var(--white);
    text-decoration: none;
  }

  .logo span { color: var(--gold); }

  nav { display: flex; gap: 36px; align-items: center; }

  nav a {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  nav a:hover { color: var(--white); }

  .nav-actions { display: flex; gap: 20px; align-items: center; }

  .nav-actions button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.2s;
    display: flex;
    align-items: center;
  }

  .nav-actions button:hover { color: var(--white); }

  .cart-btn {
    position: relative;
  }

  .cart-count {
    position: absolute;
    top: -6px; right: -6px;
    background: var(--gold);
    color: var(--black);
    font-size: 10px;
    font-weight: 700;
    width: 16px; height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }

  .hamburger span {
    display: block;
    width: 22px;
    height: 1.5px;
    background: var(--white);
    transition: all 0.3s;
  }

  /* MOBILE NAV */
  .mobile-nav {
    position: fixed;
    top: 70px; left: 0; right: 0;
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 24px 40px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 999;
    transform: translateY(-110%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  .mobile-nav.open { transform: translateY(0); }

  .mobile-nav a {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .mobile-nav a:hover { color: var(--white); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    padding-top: 70px;
  }

  #vanta-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(10,10,10,0.85) 0%, rgba(10,10,10,0.5) 100%);
    z-index: 1;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 760px;
    padding: 0 24px;
  }

  .hero-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 6px 16px;
    border-radius: 2px;
    margin-bottom: 28px;
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(52px, 8vw, 96px);
    font-weight: 300;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 24px;
    color: var(--white);
  }

  .hero h1 em {
    font-style: italic;
    color: var(--gold-light);
  }

  .hero p {
    font-size: 16px;
    font-weight: 300;
    color: rgba(245,245,240,0.7);
    max-width: 480px;
    margin: 0 auto 40px;
    line-height: 1.8;
  }

  .hero-cta {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--gold);
    color: var(--black);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 16px 36px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-primary:hover {
    background: var(--gold-light);
    transform: translateY(-1px);
  }

  .btn-outline {
    background: transparent;
    color: var(--white);
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 16px 36px;
    border: 1px solid rgba(245,245,240,0.3);
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, transform 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .btn-outline:hover {
    border-color: var(--white);
    transform: translateY(-1px);
  }

  .hero-scroll {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: bounce 2s infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(6px); }
  }

  /* TICKER */
  .ticker {
    background: var(--gold);
    color: var(--black);
    padding: 10px 0;
    overflow: hidden;
    white-space: nowrap;
  }

  .ticker-inner {
    display: inline-flex;
    animation: ticker 25s linear infinite;
    gap: 0;
  }

  .ticker-inner span {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0 40px;
  }

  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* SECTIONS */
  section { padding: 100px 40px; }

  .container { max-width: 1200px; margin: 0 auto; }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
  }

  .section-sub {
    font-size: 15px;
    font-weight: 300;
    color: var(--muted);
    max-width: 480px;
    line-height: 1.8;
    margin-bottom: 60px;
  }

  /* CATEGORIES */
  .categories { background: var(--dark); }

  .cat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .cat-card {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
  }

  .cat-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    filter: brightness(0.7);
  }

  .cat-card:hover img {
    transform: scale(1.06);
    filter: brightness(0.85);
  }

  .cat-card-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 28px 24px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
  }

  .cat-card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .cat-card-name {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    color: var(--white);
  }

  .cat-card-count {
    font-size: 12px;
    color: rgba(245,245,240,0.6);
    margin-top: 4px;
  }

  /* FEATURED PRODUCTS */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }

  .product-card {
    background: var(--card);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .product-img {
    position: relative;
    aspect-ratio: 4/3;
    overflow: hidden;
  }

  .product-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s;
  }

  .product-card:hover .product-img img { transform: scale(1.04); }

  .product-badge {
    position: absolute;
    top: 16px; left: 16px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 10px;
  }

  .badge-new { background: var(--gold); color: var(--black); }
  .badge-hot { background: #c0392b; color: var(--white); }
  .badge-sale { background: #2c7be5; color: var(--white); }

  .product-actions {
    position: absolute;
    top: 16px; right: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    opacity: 0;
    transform: translateX(8px);
    transition: opacity 0.3s, transform 0.3s;
  }

  .product-card:hover .product-actions {
    opacity: 1;
    transform: translateX(0);
  }

  .action-btn {
    width: 36px; height: 36px;
    background: rgba(10,10,10,0.85);
    border: none;
    color: var(--white);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    border-radius: 2px;
  }

  .action-btn:hover { background: var(--gold); color: var(--black); }

  .product-info { padding: 22px 22px 26px; }

  .product-brand {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .product-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .product-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .product-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .product-price {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    color: var(--white);
  }

  .product-price .original {
    font-size: 14px;
    color: var(--muted);
    text-decoration: line-through;
    margin-left: 8px;
    font-weight: 300;
  }

  .add-btn {
    background: var(--gold);
    color: var(--black);
    border: none;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 18px;
    cursor: pointer;
    transition: background 0.2s;
    border-radius: 2px;
  }

  .add-btn:hover { background: var(--gold-light); }

  /* BANNER */
  .banner {
    padding: 0 40px;
  }

  .banner-inner {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
    min-height: 380px;
    display: flex;
    align-items: center;
  }

  .banner-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.45);
  }

  .banner-content {
    position: relative;
    z-index: 1;
    padding: 60px;
    max-width: 500px;
  }

  .banner-content .section-label { margin-bottom: 14px; }

  .banner-content h2 {
    font-family: var(--font-display);
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 18px;
  }

  .banner-content p {
    font-size: 14px;
    color: rgba(245,245,240,0.7);
    margin-bottom: 30px;
    line-height: 1.8;
  }

  /* NEWSLETTER */
  .newsletter { background: var(--dark); }

  .newsletter-inner {
    max-width: 600px;
    margin: 0 auto;
    text-align: center;
  }

  .newsletter-form {
    display: flex;
    gap: 0;
    margin-top: 36px;
  }

  .newsletter-form input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-right: none;
    color: var(--white);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 16px 20px;
    outline: none;
    transition: border-color 0.2s;
  }

  .newsletter-form input::placeholder { color: var(--muted); }
  .newsletter-form input:focus { border-color: var(--gold); }

  .newsletter-form button {
    background: var(--gold);
    color: var(--black);
    border: none;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 16px 28px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .newsletter-form button:hover { background: var(--gold-light); }

  /* TESTIMONIALS */
  .testimonials { background: var(--black); }

  .test-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }

  .test-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 32px;
  }

  .test-stars {
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .test-text {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 300;
    font-style: italic;
    line-height: 1.7;
    color: rgba(245,245,240,0.85);
    margin-bottom: 20px;
  }

  .test-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .test-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border);
  }

  .test-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
  }

  .test-role {
    font-size: 12px;
    color: var(--muted);
  }

  /* BRANDS */
  .brands { background: var(--dark); padding: 60px 40px; }

  .brands-inner {
    max-width: 1200px;
    margin: 0 auto;
    text-align: center;
  }

  .brands-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .brands-row {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 48px;
  }

  .brand-name {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 600;
    color: rgba(245,245,240,0.2);
    letter-spacing: 0.1em;
    transition: color 0.3s;
    cursor: default;
  }

  .brand-name:hover { color: rgba(245,245,240,0.6); }

  /* FOOTER */
  footer {
    background: var(--dark);
    border-top: 1px solid var(--border);
    padding: 70px 40px 40px;
  }

  .footer-grid {
    max-width: 1200px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 48px;
    margin-bottom: 60px;
  }

  .footer-brand .logo { display: inline-block; margin-bottom: 16px; }

  .footer-brand p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
    max-width: 260px;
    margin-bottom: 24px;
  }

  .social-links { display: flex; gap: 12px; }

  .social-link {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: border-color 0.2s, color 0.2s;
    border-radius: 2px;
    cursor: pointer;
  }

  .social-link:hover { border-color: var(--gold); color: var(--gold); }

  .footer-col h4 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--white);
    margin-bottom: 20px;
  }

  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }

  .footer-col ul a {
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .footer-col ul a:hover { color: var(--white); }

  .footer-bottom {
    max-width: 1200px;
    margin: 0 auto;
    padding-top: 30px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-bottom p {
    font-size: 12px;
    color: var(--muted);
  }

  .footer-bottom a { color: var(--gold); text-decoration: none; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: var(--card);
    border: 1px solid var(--gold);
    color: var(--white);
    font-size: 13px;
    padding: 14px 22px;
    z-index: 9999;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    border-radius: 2px;
    max-width: 280px;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* RESPONSIVE */
  @media (max-width: 1024px) {
    .cat-grid { grid-template-columns: repeat(2, 1fr); }
    .products-grid { grid-template-columns: repeat(2, 1fr); }
    .footer-grid { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 768px) {
    header { padding: 0 20px; }
    nav, .nav-actions .search-btn { display: none; }
    .hamburger { display: flex; }
    section { padding: 70px 20px; }
    .banner { padding: 0 20px; }
    .banner-content { padding: 36px 28px; }
    .cat-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .products-grid { grid-template-columns: 1fr; }
    .test-grid { grid-template-columns: 1fr; }
    .footer-grid { grid-template-columns: 1fr; gap: 32px; }
    footer { padding: 50px 20px 30px; }
    .footer-bottom { flex-direction: column; text-align: center; }
    .newsletter-form { flex-direction: column; }
    .newsletter-form input { border-right: 1px solid var(--border); border-bottom: none; }
    .mobile-nav { padding: 24px 20px; }
  }
</style>
</head>
<body x-data="{ mobileOpen: false, cartCount: 0 }">

<!-- HEADER -->
<header>
  <a href="#" class="logo">Cura<span>to</span></a>
  <nav>
    <a href="#categories">Shop</a>
    <a href="#featured">Featured</a>
    <a href="#deals">Deals</a>
    <a href="#about">About</a>
  </nav>
  <div class="nav-actions">
    <button class="search-btn"><i data-lucide="search" width="18" height="18"></i></button>
    <button class="cart-btn">
      <i data-lucide="shopping-bag" width="18" height="18"></i>
      <span class="cart-count" x-text="cartCount" x-show="cartCount > 0"></span>
    </button>
    <button class="hamburger" @click="mobileOpen = !mobileOpen">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<!-- MOBILE NAV -->
<div class="mobile-nav" :class="{ open: mobileOpen }">
  <a href="#categories" @click="mobileOpen = false">Shop</a>
  <a href="#featured" @click="mobileOpen = false">Featured</a>
  <a href="#deals" @click="mobileOpen = false">Deals</a>
